<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Abalone — Shader Gallery</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { background: #000; overflow: hidden; }
    canvas { display: block; width: 100vw; height: 100vh; }
    #info {
      position: fixed; bottom: 1.5rem; left: 50%; transform: translateX(-50%);
      color: rgba(200,220,255,0.5); font: 0.8rem/1 system-ui;
      text-align: center; pointer-events: none;
    }
    #info a { color: rgba(150,220,255,0.7); text-decoration: none; }
  </style>
</head>
<body>
<canvas id="c"></canvas>
<div id="info">Abalone · iridescent thin-film interference · <a href="../docs/index.html">← gallery</a></div>
<script>
const c = document.getElementById('c');
const gl = c.getContext('webgl');

function resize() {
  c.width  = innerWidth  * devicePixelRatio;
  c.height = innerHeight * devicePixelRatio;
  gl.viewport(0, 0, c.width, c.height);
}
resize();
window.addEventListener('resize', resize);

const vert = gl.createShader(gl.VERTEX_SHADER);
gl.shaderSource(vert, 'attribute vec2 p;void main(){gl_Position=vec4(p,0,1);}');
gl.compileShader(vert);

const fragSrc = `precision mediump float;
uniform float u_time; uniform vec2 u_res;
float hash(vec2 p){return fract(sin(dot(p,vec2(127.1,311.7)))*43758.5453);}
float noise(vec2 p){vec2 i=floor(p),f=fract(p);f=f*f*(3.-2.*f);return mix(mix(hash(i),hash(i+vec2(1,0)),f.x),mix(hash(i+vec2(0,1)),hash(i+vec2(1,1)),f.x),f.y);}
float fbm(vec2 p){float v=0.,a=.5;mat2 r=mat2(.877,.479,-.479,.877);for(int i=0;i<6;i++){v+=a*noise(p);p=r*p*2.1;a*=.48;}return v;}
vec3 pearl(float t){vec3 a=vec3(.55,.50,.55),b=vec3(.45,.45,.45),cv=vec3(1,1,1),d=vec3(0.,.15,.40);return a+b*cos(6.28318*(cv*t+d));}
void main(){
  vec2 uv=(gl_FragCoord.xy/u_res)*2.-1.;uv.x*=u_res.x/u_res.y;
  float t=u_time*.18;
  vec2 w1=vec2(fbm(uv*1.8+vec2(t,t*.7)),fbm(uv*1.8+vec2(t*.6+4.3,-t*.5+1.7)));
  vec2 w2=vec2(fbm(uv*3.5+w1*1.4+t*.5),fbm(uv*3.5+w1*1.4-t*.4+9.1));
  vec3 n=normalize(vec3(w2*.8,1.));vec3 l=normalize(vec3(sin(t*.7)*.6,cos(t*.5)*.6,1.));
  float ndl=dot(n,l)*.5+.5;
  float fp=fbm(uv*2.+w1*.6)*2.+ndl*1.6+t*.25;
  vec3 col=pearl(fp);
  float spec=pow(max(0.,dot(n,l)),32.);col+=vec3(1.,.97,.92)*spec*.6;
  float depth=fbm(uv*1.2+t*.1);col=mix(col*.25,col,smoothstep(.2,.7,depth));
  float vig=1.-dot(uv*.5,uv*.5);col*=smoothstep(0.,.6,vig);
  gl_FragColor=vec4(col,1.);
}`;

const frag = gl.createShader(gl.FRAGMENT_SHADER);
gl.shaderSource(frag, fragSrc);
gl.compileShader(frag);

const prog = gl.createProgram();
gl.attachShader(prog, vert); gl.attachShader(prog, frag);
gl.linkProgram(prog); gl.useProgram(prog);

const buf = gl.createBuffer();
gl.bindBuffer(gl.ARRAY_BUFFER, buf);
gl.bufferData(gl.ARRAY_BUFFER, new Float32Array([-1,-1,1,-1,-1,1,1,1]), gl.STATIC_DRAW);
const loc = gl.getAttribLocation(prog, 'p');
gl.enableVertexAttribArray(loc);
gl.vertexAttribPointer(loc, 2, gl.FLOAT, false, 0, 0);

const uTime = gl.getUniformLocation(prog, 'u_time');
const uRes  = gl.getUniformLocation(prog, 'u_res');

let t = 0;
(function draw() {
  gl.uniform2f(uRes, c.width, c.height);
  t += 0.016;
  gl.uniform1f(uTime, t);
  gl.drawArrays(gl.TRIANGLE_STRIP, 0, 4);
  requestAnimationFrame(draw);
})();
</script>
</body>
</html>
