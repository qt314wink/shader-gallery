<!DOCTYPE html><html><head><meta charset="UTF-8"><title>Aurora — Shader Gallery</title>
<style>*{margin:0;padding:0}body{background:#000}canvas{display:block;width:100vw;height:100vh}</style></head>
<body><canvas id="c"></canvas>
<script>
const c=document.getElementById('c'),gl=c.getContext('webgl');
c.width=innerWidth;c.height=innerHeight;
const v=gl.createShader(gl.VERTEX_SHADER);gl.shaderSource(v,'attribute vec2 p;void main(){gl_Position=vec4(p,0,1);}');gl.compileShader(v);
const f=gl.createShader(gl.FRAGMENT_SHADER);
gl.shaderSource(f,`precision mediump float;uniform float u_time;uniform vec2 u_res;
float hash(vec2 p){return fract(sin(dot(p,vec2(127.1,311.7)))*43758.5);}
float noise(vec2 p){vec2 i=floor(p),f=fract(p);f=f*f*(3.-2.*f);return mix(mix(hash(i),hash(i+vec2(1,0)),f.x),mix(hash(i+vec2(0,1)),hash(i+vec2(1,1)),f.x),f.y);}
float fbm(vec2 p){float v=0.,a=.5;for(int i=0;i<6;i++){v+=a*noise(p);p*=2.;a*=.5;}return v;}
void main(){vec2 uv=(gl_FragCoord.xy/u_res)*2.-1.;uv.x*=u_res.x/u_res.y;float t=u_time*.3;vec2 q=vec2(fbm(uv+t),fbm(uv+vec2(1.7,9.2)+t*.8));float f=fbm(uv+3.*q);vec3 col=mix(vec3(0.,.02,.08),mix(vec3(.1,.8,.4),vec3(0.,.3,.9),f),f*1.2);col=mix(col,vec3(.8,.2,.9),clamp(f*f*2.-1.,0.,1.));gl_FragColor=vec4(col,1.);}`);
gl.compileShader(f);const p=gl.createProgram();gl.attachShader(p,v);gl.attachShader(p,f);gl.linkProgram(p);gl.useProgram(p);
const b=gl.createBuffer();gl.bindBuffer(gl.ARRAY_BUFFER,b);gl.bufferData(gl.ARRAY_BUFFER,new Float32Array([-1,-1,1,-1,-1,1,1,1]),gl.STATIC_DRAW);
const l=gl.getAttribLocation(p,'p');gl.enableVertexAttribArray(l);gl.vertexAttribPointer(l,2,gl.FLOAT,false,0,0);
const uT=gl.getUniformLocation(p,'u_time'),uR=gl.getUniformLocation(p,'u_res');gl.uniform2f(uR,c.width,c.height);
let t=0;(function draw(){t+=.016;gl.uniform1f(uT,t);gl.drawArrays(gl.TRIANGLE_STRIP,0,4);requestAnimationFrame(draw)})();
</script></body></html>
